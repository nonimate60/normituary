# ====================================================================
# normituary — caching proxy for api.normies.art
# File: /etc/nginx/sites-available/normies-proxy.conf
#
# Solves, in one layer:
#   1. CORS        — adds Access-Control-Allow-Origin to every response
#   2. Rate limit  — upstream allows 60 req/min/IP; with cache, your
#                    visitors hit the upstream only on cache MISS
#   3. Latency     — burned images are served from local disk forever
#
# Cache strategy (the important part):
#   /history/burned/*            -> 365d  (the dead never change)
#   /history/burns/<id>          -> 1h    (commit detail; immutable once revealed)
#   /history/burns, burned-tokens, stats -> 30s (volatile lists/counters)
#   /normie/*, /agents/*         -> 5m    (canvas edits can change them)
#   /holders/*, /canvas/*        -> 60s   (ownership / status)
# ====================================================================

# ---- http-context directives (this file is included inside http{}) ----
proxy_cache_path /var/cache/nginx/normies
                 levels=1:2
                 keys_zone=normies_cache:20m
                 max_size=3g
                 inactive=400d
                 use_temp_path=off;

# protect YOUR vps from abuse (inbound limit, generous)
limit_req_zone $binary_remote_addr zone=normies_rl:10m rate=20r/s;

server {
    listen 8080;
    listen [::]:8080;
    server_name _;
    # HTTPS later: point a (sub)domain at this server, change listen to 80,
    # then run:  certbot --nginx -d normies.yourdomain.com

    # re-resolve upstream DNS periodically (IP may rotate)
    resolver 1.1.1.1 8.8.8.8 valid=300s ipv6=off;
    set $normies_upstream api.normies.art;

    # ---- shared proxy settings (inherited by all locations) ----
    proxy_ssl_server_name on;
    proxy_ssl_name        api.normies.art;
    proxy_set_header Host api.normies.art;
    proxy_set_header User-Agent "normituary-proxy/1.0";
    proxy_http_version 1.1;
    proxy_connect_timeout 10s;
    proxy_read_timeout    30s;

    proxy_cache            normies_cache;
    proxy_cache_key        $request_method$uri$is_args$args;
    proxy_ignore_headers   Cache-Control Expires Set-Cookie;
    proxy_cache_lock       on;            # 100 visitors = 1 upstream request
    proxy_cache_lock_timeout 15s;
    # serve stale instead of failing if upstream is down or rate-limits us
    proxy_cache_use_stale  error timeout updating http_429 http_500 http_502 http_503;

    # =========== IMMORTAL: burned images & burn info ===========
    location ~ ^/history/burned/ {
        limit_req zone=normies_rl burst=60 nodelay;
        proxy_pass https://$normies_upstream;
        proxy_cache_valid 200 365d;
        proxy_cache_valid 404 60s;
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # =========== commit detail (immutable once revealed) ===========
    location ~ ^/history/burns/[0-9]+$ {
        limit_req zone=normies_rl burst=60 nodelay;
        proxy_pass https://$normies_upstream;
        proxy_cache_valid 200 1h;
        proxy_cache_valid 404 30s;
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header X-Cache-Status $upstream_cache_status always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # =========== volatile: lists, per-address history, stats ===========
    location ~ ^/history/ {
        limit_req zone=normies_rl burst=60 nodelay;
        proxy_pass https://$normies_upstream;
        proxy_cache_valid 200 30s;
        proxy_cache_valid 404 15s;
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header X-Cache-Status $upstream_cache_status always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # =========== living normies (canvas edits can change them) ===========
    location ~ ^/(normie|agents)/ {
        limit_req zone=normies_rl burst=60 nodelay;
        proxy_pass https://$normies_upstream;
        proxy_cache_valid 200 5m;
        proxy_cache_valid 404 60s;
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header X-Cache-Status $upstream_cache_status always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # =========== ownership / canvas status ===========
    location ~ ^/(holders|canvas)/ {
        limit_req zone=normies_rl burst=60 nodelay;
        proxy_pass https://$normies_upstream;
        proxy_cache_valid 200 60s;
        proxy_cache_valid 404 30s;
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header X-Cache-Status $upstream_cache_status always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # health check (no upstream)
    location = /proxy-health {
        add_header Access-Control-Allow-Origin * always;
        return 200 "ok\n";
    }

    # anything else: not proxied
    location / { return 404; }
}
